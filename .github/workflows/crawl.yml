name: Geocache Crawler

on:
  # 定时触发：每天 UTC 20:00 运行（北京时间次日 04:00）
  schedule:
    - cron: '0 20 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'both'
        type: choice
        options:
          - caches
          - logs
          - both
          - generate

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GEOCOOKIE_NONPREMIUM: ${{ secrets.GEOCOOKIE_NONPREMIUM }}
  GEOCOOKIE_PREMIUM: ${{ secrets.GEOCOOKIE_PREMIUM }}

jobs:
  crawl-caches:
    runs-on: ubuntu-latest
    if: github.event.inputs.mode == 'caches' || github.event.inputs.mode == 'both' || github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run cache crawler
        run: python crawl_caches.py
        timeout-minutes: 360
        env:
          LOG_TO_FILE: '1'

      - name: Assign cache cities
        run: python assign_cities.py
        timeout-minutes: 60
        env:
          LOG_TO_FILE: '1'
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-caches-logs
          path: crawl_caches.log

  crawl-logs:
    runs-on: ubuntu-latest
    needs: crawl-caches
    if: always() && (github.event.inputs.mode == 'logs' || github.event.inputs.mode == 'both' || github.event_name == 'schedule')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run logs crawler
        run: python crawl_logs.py
        timeout-minutes: 360
        env:
          LOG_TO_FILE: '1'

      - name: Crawl missing user registration dates
        if: github.event.inputs.mode == 'both' || github.event_name == 'schedule'
        run: python crawl_user_regdates.py
        timeout-minutes: 360
        env:
          LOG_TO_FILE: '1'
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-logs-logs
          path: |
            crawl_logs.log
            crawl_user_regdates.log

  generate-data:
    runs-on: ubuntu-latest
    needs: crawl-logs
    if: always() && (github.event.inputs.mode == 'both' || github.event.inputs.mode == 'generate' || github.event_name == 'schedule')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate static data files
        run: python generate_data.py
        timeout-minutes: 30
        env:
          LOG_TO_FILE: '1'

      - name: Setup SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GEODATAING_DEPLOY_KEY }}" > ~/.ssh/geodataing_deploy
          chmod 600 ~/.ssh/geodataing_deploy
          cat >> ~/.ssh/config << 'EOF'
          Host github.com
            IdentityFile ~/.ssh/geodataing_deploy
            StrictHostKeyChecking no
          EOF

      - name: Push to Geodataing repository
        run: |
          git clone git@github.com:EPoNeNT/Geodataing.git /tmp/Geodataing
          mkdir -p /tmp/Geodataing/public/data
          cp public/data/*.json /tmp/Geodataing/public/data/
          cd /tmp/Geodataing
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "auto-update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin master
            echo "Pushed to Geodataing successfully"
          else
            echo "No changes to push"
          fi

      - name: Upload generated data
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: public/data/

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generate-data-logs
          path: generate_data.log

name: Geocache Crawler

on:
  # 定时触发：每天 UTC 20:00 运行（北京时间次日 04:00）
  schedule:
    - cron: '0 20 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '爬取模式'
        required: true
        default: 'both'
        type: choice
        options:
          - caches
          - logs
          - both

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GEOCOOKIE_NONPREMIUM: ${{ secrets.GEOCOOKIE_NONPREMIUM }}
  GEOCOOKIE_PREMIUM: ${{ secrets.GEOCOOKIE_PREMIUM }}

jobs:
  crawl-caches:
    runs-on: ubuntu-latest
    if: github.event.inputs.mode == 'caches' || github.event.inputs.mode == 'both' || github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run cache crawler
        run: python crawl_caches.py
        timeout-minutes: 360
        env:
          LOG_TO_FILE: '1'
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-caches-logs
          path: crawl_caches.log

  crawl-logs:
    runs-on: ubuntu-latest
    needs: crawl-caches
    if: github.event.inputs.mode == 'logs' || github.event.inputs.mode == 'both' || github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run logs crawler
        run: python crawl_logs.py
        timeout-minutes: 360
        env:
          LOG_TO_FILE: '1'
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-logs-logs
          path: crawl_logs.log
